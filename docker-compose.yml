# Local dev infra for FastCheck: Postgres (source of truth) + Redis (cache/lock/registry) + RabbitMQ (queue).
# The worker runs NATIVE on Windows with GemLogin (not in Docker) — only the server-side infra is containerised.
# No ELK/Prometheus here on purpose (Phase 0): pino JSON logs are enough. See docs/tech-stack.md.
services:
  postgres:
    image: postgres:16-alpine
    container_name: fastcheck-postgres
    environment:
      POSTGRES_USER: fastcheck
      POSTGRES_PASSWORD: fastcheck
      POSTGRES_DB: fastcheck
    ports:
      - "5432:5432"
    volumes:
      - fastcheck_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastcheck -d fastcheck"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: fastcheck-redis
    # INV-5: Redis is short-term memory only. allkeys-lru means losing a key makes us SLOW, never WRONG.
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fastcheck-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fastcheck
      RABBITMQ_DEFAULT_PASS: fastcheck
    ports:
      - "5672:5672" # amqp
      - "15672:15672" # management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  fastcheck_pg:
