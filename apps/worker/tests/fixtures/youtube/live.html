<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Watch - YouTube</title></head>
<body>
<div id="masthead"><button id="avatar-btn" aria-label="Account menu"><img></button></div>
  <ytd-watch-flexy>
    <div id="movie_player" class="html5-video-player"><video class="html5-main-video"></video></div>
    <!-- LIVE: tiêu đề video THẬT (khung player không đủ — trang lỗi cũng có player) -->
    <ytd-watch-metadata>
      <h1 class="slim-video-information-title"><yt-formatted-string itemprop="name">Video title here</yt-formatted-string></h1>
    </ytd-watch-metadata>
  </ytd-watch-flexy>
</body>
</html>
